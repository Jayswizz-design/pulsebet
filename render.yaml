services:
  - type: web
    name: pulsebet-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start --workspace server
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: pulsebet
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        sync: false
      - key: SPORTSDB_API_KEY
        value: 123
